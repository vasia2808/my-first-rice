monitor=HDMI-A-2,1920x1080@60,0x0,1
monitor=,preferred,auto,1

exec-once = hyprpaper
exec-once = waybar
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-clip-persist --clipboard regular
exec-once = playerctld daemon

exec-once = Telegram -startintray
exec-once = firefox
exec-once = qbittorrent

exec-once = hyprlock

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
#env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,gtk3

general { 
    gaps_out = 8
    gaps_in = 4
    border_size = 2

    col.active_border = rgb(8c2d2a)
    col.inactive_border = rgba(191319eb)
}

decoration {
    rounding = 3
    dim_special = 0.45

    shadow {
        range = 5
        render_power = 2
    }

    blur {
        enabled = false
    }
}

animations {
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 6, easeOutQuint
    animation = workspacesOut, 1, 6, easeOutQuint
    animation = zoomFactor, 1, 7, quick
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = us,ru,ua
    kb_options = grp:shifts_toggle

    touchpad {
        natural_scroll = true
    }
}

device {
    name = logitech-g102-prodigy-gaming-mouse
    sensitivity = -0.8
}

cursor {
    hotspot_padding = 0
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

$mainMod = SUPER

bind = $mainMod, R, exec, pkill rofi || rofi -show drun
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, E, exec, thunar
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, B, exec, firefox
bind = $mainMod, P, exec, pkill rmpc || alacritty -e rmpc

bind = $mainMod, S, swapnext,
bind = $mainMod SHIFT, S, swapnext, prev

bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop,

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, GRAVE, togglespecialworkspace,
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, MINUS, workspace, 11
bind = $mainMod, EQUAL, workspace, 12

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, MINUS, movetoworkspace, 11
bind = $mainMod SHIFT, EQUAL, movetoworkspace, 12

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindl = , Print, exec, file_name="$(date '+%Y-%m-%d_%H-%M-%S').png" && file_path="$HOME/Pictures/Screenshots/$file_name" && grim "$file_path" && action=$(notify-send --action='default=xxx' "Screenshot created" "$file_name"); if [ "$action" = "default" ]; then qimgv "$file_path"; fi
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

workspace = w[tv1], gapsout:0
workspace = f[1], gapsout:0
windowrule = border_size 0, rounding 0, no_shadow on, match:float false, match:workspace w[tv1]
windowrule = border_size 0, rounding 0, no_shadow on, match:float false, match:workspace f[1]

windowrule = float on, size 614 500, move monitor_w-window_x-10 40, match:class ^org\.pulseaudio\.pavucontrol$

windowrule = float on, size 1280 720, suppress_event maximize, match:class ^qimgv$
windowrule = float on, size 1280 720, match:class ^mpv$

windowrule = float on, match:class ^org\.qbittorrent\.qBittorrent$, match:title negative:^qBittorrent.*$
windowrule = float on, match:class ^firefox$, match:title ^Library$
windowrule = float on, match:title ^(File Operation Progress|Rename ".*"|Choose .*|Extract( archive)?|Compress|Save .*|Open .*)$

layerrule = animation popin 87%, match:namespace ^rofi$
layerrule = animation slide right, match:namespace ^notifications$

